services:
  backend:
    build:
      context: ./backend-rust
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      - APP_MODE=public
      - PORT=3500

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_BASE_URL: http://host.containers.internal:3500
        NEXT_PUBLIC_APP_MODE: public
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_BASE_URL=http://host.containers.internal:3500
    depends_on:
      - backend

  prometheus:
    image: docker.io/prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: docker.io/grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: docker.io/prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/containers:/var/lib/docker:ro

volumes:
  prometheus_data:
  grafana_data:

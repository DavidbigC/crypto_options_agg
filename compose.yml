services:
  backend:
    build:
      context: ./backend-rust
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      - APP_MODE=private
      - PORT=3500

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_BASE_URL: http://backend:3500
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend


global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['crypto_options_agg_node-exporter_1:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['crypto_options_agg_cadvisor_1:8080']
